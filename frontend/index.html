<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0,
        viewport-fit=cover, maximum-scale=1.0, user-scalable=no"/>
  <meta name="description" content="Guyunusa — Inteligencia artificial con identidad uruguaya"/>
  <meta name="theme-color" content="#1a4fa0"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

  <!-- Prevenir flash de tema incorrecto -->
  <script>
    (function() {
      var t = localStorage.getItem('guyunusa_theme');
      var dark = t === 'dark' ||
        (t !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>

  <title>Guyunusa</title>
  <link rel="stylesheet" href="css/main.css"/>
</head>
<body>
  <div id="app">
    <div class="app-loading">
      <svg class="app-loading__sol" width="52" height="52" viewBox="0 0 90 90">
        <circle cx="45" cy="45" r="20" fill="#e8b84b"/>
        <circle cx="45" cy="45" r="17" fill="#f0c96a"/>
        <circle cx="39" cy="43" r="2.2" fill="#b8860b"/>
        <circle cx="51" cy="43" r="2.2" fill="#b8860b"/>
        <path d="M39 51 Q45 56 51 51" stroke="#b8860b" stroke-width="1.8"
              fill="none" stroke-linecap="round"/>
      </svg>
      <span class="app-loading__text">Cargando Guyunusa...</span>
    </div>
  </div>

  <!-- Capacitor runtime (solo existe en la app nativa) -->
  <script src="capacitor.js" onerror="void(0)"></script>

  <script type="module" src="js/app.js"></script>

  <style>
    .app-loading {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: #faf9f6;
    }
    [data-theme="dark"] .app-loading { background: #1a1814; }
    .app-loading__sol {
      animation: sol-spin 2s linear infinite;
    }
    @keyframes sol-spin { to { transform: rotate(360deg); } }
    .app-loading__text {
      font-family: system-ui, sans-serif;
      font-size: 14px;
      color: #9c9585;
    }
    [data-theme="dark"] .app-loading__text { color: #6b6254; }
  </style>
</body>
</html>
